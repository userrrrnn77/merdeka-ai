name: Keep Qdrant Alive

# Tujuan: mencegah cluster Qdrant Cloud free tier auto-suspend
# (suspend terjadi kalau cluster idle >= 1 minggu tanpa aktivitas).
# Workflow ini hit endpoint /collections tiap 3 hari sekali,
# jauh di bawah threshold 7 hari, jadi ada buffer aman kalau
# sekali dua kali run gagal/di-skip GitHub.

on:
  schedule:
    # Tiap 3 hari sekali, jam 03:00 UTC (10:00 WIB)
    - cron: "0 3 */3 * *"
  workflow_dispatch: {} # tombol manual "Run workflow" di tab Actions

jobs:
  ping-qdrant:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Qdrant collections endpoint
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "api-key: ${{ secrets.QDRANT_API_KEY }}" \
            "${{ secrets.QDRANT_URL }}/collections")

          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$response" -ne 200 ]; then
            echo "::error::Qdrant ping gagal dengan status $response. Cek apakah cluster suspended atau URL/API key berubah."
            exit 1
          fi

          echo "Qdrant ping berhasil, cluster tetap aktif."